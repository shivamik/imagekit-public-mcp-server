AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ImageKit Public MCP Server

Globals:
  Function:
    Timeout: 60
    MemorySize: 256

Resources:
  McpServerFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - arm64
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
      Environment:
        Variables:
          AWS_LWA_INVOKE_MODE: RESPONSE_STREAM
          PORT: "8080"
          UV_CACHE_DIR: /tmp/.uv-cache
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: .
      DockerTag: latest

Outputs:
  McpServerUrl:
    Description: MCP Server Function URL
    Value: !GetAtt McpServerFunctionUrl.FunctionUrl
  McpServerFunctionArn:
    Description: MCP Server Function ARN
    Value: !GetAtt McpServerFunction.Arn
